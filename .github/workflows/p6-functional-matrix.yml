name: P6 functional acceptance matrix
run-name: P6 evidence ${{ github.ref_name }}

on:
  push:
    tags:
      - "p6-acceptance-*"

permissions:
  contents: read

jobs:
  functional:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'
    env:
      EVIDENCE_ID: ${{ github.ref_name }}
      IMPLEMENTATION_COMMIT: ${{ github.sha }}
      RUN_ID: ${{ github.run_id }}
      RUN_ATTEMPT: ${{ github.run_attempt }}
      MATRIX_OS: ${{ matrix.os }}
      MATRIX_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install frozen functional dependencies
        run: |
          python -m pip install uv==0.9.14
          uv sync --frozen --extra dev

      - name: Run P6 focused and protected contracts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .quality/p6-matrix
          PYTHONPATH="$PWD/src:$PWD/tests" uv run --frozen --extra dev \
            python -m pytest -vv -rsxX \
            -o xfail_strict=true \
            tests/test_index_health.py \
            tests/test_manifest_v2.py \
            tests/test_p6_operational_store.py \
            tests/test_incremental_refresh.py \
            tests/test_tokenizer_scanner.py \
            tests/test_indexer_manifest.py \
            tests/test_graph_lifecycle.py \
            tests/test_graph_store.py \
            tests/test_embeddings_vector_store.py \
            tests/test_cli_commands.py \
            tests/test_mcp_tools.py \
            tests/test_mcp_server.py \
            tests/test_p6_benchmark.py \
            tests/test_sqlite_store.py \
            tests/test_repo_profile.py \
            tests/test_p5_inputs.py \
            tests/test_p5_graph_contract.py \
            tests/test_quality_p5.py \
            tests/test_p5_protected_direct.py \
            tests/test_resolved_graph_expansion.py \
            tests/test_p5_explain.py \
            tests/test_retrieval_core_characterization.py \
            tests/test_retrieval_core_boundaries.py \
            tests/test_retrieval_trace.py \
            tests/test_retrieval_trace_pipeline.py \
            tests/test_context_pack.py \
            tests/test_exploration_boundaries.py \
            tests/test_exploration_contracts.py \
            tests/test_exploration_runner.py \
            tests/test_quality_p3.py \
            tests/test_quality_p4.py \
            --junitxml=.quality/p6-matrix/junit.xml \
            2>&1 | tee .quality/p6-matrix/pytest.log

      - name: Audit skip and xfail nodes and emit matrix summary
        shell: bash
        run: |
          set -euo pipefail
          uv run --frozen --extra dev python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          from pathlib import Path, PurePosixPath
          import platform
          import re
          import subprocess
          import xml.etree.ElementTree as ET

          from jsonschema import Draft202012Validator

          root = Path.cwd()
          junit_path = root / ".quality/p6-matrix/junit.xml"
          junit_bytes = junit_path.read_bytes()
          pytest_log = (root / ".quality/p6-matrix/pytest.log").read_text(
              encoding="utf-8"
          )
          terminal_nodes = {"SKIPPED": [], "XFAIL": [], "XPASS": []}
          for match in re.finditer(
              r"^(tests[/\\].*?::.*?)\s+(SKIPPED|XFAIL|XPASS)(?:\s|$)",
              pytest_log,
              re.MULTILINE,
          ):
              raw_node = match.group(1)
              raw_file, separator, node_suffix = raw_node.partition("::")
              normalized_file = raw_file.replace("\\", "/")
              file_path = PurePosixPath(normalized_file)
              if (
                  not separator
                  or file_path.is_absolute()
                  or ".." in file_path.parts
                  or not normalized_file.startswith("tests/")
                  or file_path.suffix != ".py"
                  or not node_suffix
              ):
                  raise SystemExit("pytest emitted an unsafe or invalid node ID")
              terminal_nodes[match.group(2)].append(
                  f"{normalized_file}::{node_suffix}"
              )
          xml = ET.fromstring(junit_bytes)
          suites = [xml] if xml.tag == "testsuite" else list(xml.findall("testsuite"))
          cases = [case for suite in suites for case in suite.findall("testcase")]
          skipped: list[str] = []
          xfailed: list[str] = []
          failed = 0
          errors = 0
          for case in cases:
              failed += len(case.findall("failure"))
              errors += len(case.findall("error"))
              marker = case.find("skipped")
              if marker is None:
                  continue
              marker_type = marker.attrib.get("type", "").lower()
              marker_message = marker.attrib.get("message", "").lower()
              if "xfail" in marker_type or "xfail" in marker_message:
                  xfailed.append(case.attrib.get("name", ""))
              else:
                  skipped.append(case.attrib.get("name", ""))

          if len(terminal_nodes["SKIPPED"]) != len(skipped):
              raise SystemExit("pytest/JUnit skip counts disagree")
          if len(terminal_nodes["XFAIL"]) != len(xfailed):
              raise SystemExit("pytest/JUnit xfail counts disagree")
          if terminal_nodes["XPASS"]:
              raise SystemExit("P6 functional matrix forbids XPASS nodes")
          skipped = sorted(terminal_nodes["SKIPPED"])
          xfailed = sorted(terminal_nodes["XFAIL"])

          print("optional skip nodes:")
          for node_id in sorted(skipped):
              print(f"  {node_id}")
          print("xfail nodes:")
          for node_id in sorted(xfailed):
              print(f"  {node_id}")
          if xfailed:
              raise SystemExit("P6 functional matrix forbids xfail nodes")

          production_tree = subprocess.check_output(
              ["git", "rev-parse", "HEAD:src/context_search_tool"],
              text=True,
          ).strip()
          workflow_bytes = (
              root / ".github/workflows/p6-functional-matrix.yml"
          ).read_bytes()
          dependency_lock = (root / "uv.lock").read_bytes()
          summary = {
              "schema_version": 1,
              "implementation_commit": os.environ["IMPLEMENTATION_COMMIT"],
              "production_tree": production_tree,
              "workflow_sha256": hashlib.sha256(workflow_bytes).hexdigest(),
              "os": os.environ["MATRIX_OS"],
              "architecture": platform.machine() or "unknown",
              "python_version": os.environ["MATRIX_PYTHON"],
              "dependency_lock_sha256": hashlib.sha256(dependency_lock).hexdigest(),
              "tests": {
                  "passed": len(cases) - len(skipped) - len(xfailed) - failed - errors,
                  "failed": failed,
                  "errors": errors,
                  "skipped": len(skipped),
                  "xfail": len(xfailed),
                  "skip_node_ids": sorted(skipped),
              },
              "junit_sha256": hashlib.sha256(junit_bytes).hexdigest(),
              "run": {
                  "evidence_id": os.environ["EVIDENCE_ID"],
                  "run_id": os.environ["RUN_ID"],
                  "run_attempt": int(os.environ["RUN_ATTEMPT"]),
              },
              "conclusion": "success",
          }
          schema = json.loads(
              (
                  root
                  / "docs/benchmarks/p6/schemas/matrix-summary-v1.json"
              ).read_text(encoding="utf-8")
          )
          Draft202012Validator(schema).validate(summary)
          output = root / ".quality/p6-matrix/matrix-summary-v1.json"
          output.write_text(
              json.dumps(
                  summary,
                  ensure_ascii=False,
                  allow_nan=False,
                  sort_keys=True,
                  separators=(",", ":"),
              )
              + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload schema-valid P6 evidence
        uses: actions/upload-artifact@v6
        with:
          name: p6-${{ github.ref_name }}-${{ matrix.os }}-py${{ matrix.python-version }}
          if-no-files-found: error
          path: |
            .quality/p6-matrix/junit.xml
            .quality/p6-matrix/matrix-summary-v1.json
