name: P6 cloud full-build diagnostic
run-name: P6 cloud full-build ${{ github.sha }}

on:
  push:
    branches:
      - codex/p6-cloud-acceptance
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shard:
    name: smoke sample ${{ matrix.sample }}
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      fail-fast: false
      matrix:
        sample: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install frozen dependencies
        run: |
          python -m pip install uv==0.9.14
          uv sync --frozen --extra dev

      - name: Generate deterministic smoke repository
        run: |
          PYTHONPATH="$PWD/src:$PWD/tests" uv run --frozen --extra dev \
            python scripts/p6_benchmark.py generate \
            --tier smoke \
            --manifest tests/fixtures/p6_performance/workload_manifest.json \
            --output .quality/p6-cloud/smoke

      - name: Run isolated full-build sample
        run: |
          PYTHONPATH="$PWD/src:$PWD/tests" uv run --frozen --extra dev \
            python scripts/p6_benchmark.py run \
            --repo .quality/p6-cloud/smoke \
            --manifest tests/fixtures/p6_performance/workload_manifest.json \
            --output .quality/p6-cloud/full-build.json \
            --operation full_build \
            --case-id default \
            --samples 5 \
            --measurement-state cli_process_cold \
            --mode baseline \
            --checkpoint-dir .quality/p6-cloud/shard-${{ matrix.sample }} \
            --shard-index ${{ matrix.sample }}

      - name: Verify one immutable sample checkpoint
        run: |
          test -f .quality/p6-cloud/shard-${{ matrix.sample }}/run.json
          test -f .quality/p6-cloud/shard-${{ matrix.sample }}/sample-00${{ matrix.sample }}.json
          test ! -e .quality/p6-cloud/full-build.json
          test "$(find .quality/p6-cloud/shard-${{ matrix.sample }} -maxdepth 1 -type f | wc -l | tr -d ' ')" = 2

      - name: Upload sample checkpoint
        uses: actions/upload-artifact@v6
        with:
          name: p6-smoke-full-build-shard-${{ matrix.sample }}
          if-no-files-found: error
          retention-days: 7
          path: .quality/p6-cloud/shard-${{ matrix.sample }}/

  merge:
    name: merge and validate five samples
    needs: shard
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install frozen dependencies
        run: |
          python -m pip install uv==0.9.14
          uv sync --frozen --extra dev

      - name: Download sample checkpoints
        uses: actions/download-artifact@v7
        with:
          pattern: p6-smoke-full-build-shard-*
          path: .quality/p6-cloud/downloads

      - name: Generate identical smoke repository
        run: |
          PYTHONPATH="$PWD/src:$PWD/tests" uv run --frozen --extra dev \
            python scripts/p6_benchmark.py generate \
            --tier smoke \
            --manifest tests/fixtures/p6_performance/workload_manifest.json \
            --output .quality/p6-cloud/smoke

      - name: Merge identity-matched checkpoints
        run: |
          PYTHONPATH="$PWD/src:$PWD/tests" uv run --frozen --extra dev \
            python scripts/p6_benchmark.py merge-checkpoints \
            --input .quality/p6-cloud/downloads/p6-smoke-full-build-shard-1 \
            --input .quality/p6-cloud/downloads/p6-smoke-full-build-shard-2 \
            --input .quality/p6-cloud/downloads/p6-smoke-full-build-shard-3 \
            --input .quality/p6-cloud/downloads/p6-smoke-full-build-shard-4 \
            --input .quality/p6-cloud/downloads/p6-smoke-full-build-shard-5 \
            --output .quality/p6-cloud/combined

      - name: Finalize and validate report without rerunning samples
        run: |
          PYTHONPATH="$PWD/src:$PWD/tests" uv run --frozen --extra dev \
            python scripts/p6_benchmark.py run \
            --repo .quality/p6-cloud/smoke \
            --manifest tests/fixtures/p6_performance/workload_manifest.json \
            --output .quality/p6-cloud/full-build.json \
            --operation full_build \
            --case-id default \
            --samples 5 \
            --measurement-state cli_process_cold \
            --mode baseline \
            --checkpoint-dir .quality/p6-cloud/combined \
            --resume
          PYTHONPATH="$PWD/src:$PWD/tests" uv run --frozen --extra dev \
            python scripts/p6_benchmark.py validate \
            --report .quality/p6-cloud/full-build.json

      - name: Summarize validity and sample count
        run: |
          PYTHONPATH="$PWD/src:$PWD/tests" uv run --frozen --extra dev python -c \
            'import json, pathlib; p=json.loads(pathlib.Path(".quality/p6-cloud/full-build.json").read_text()); assert p["summary"]["sample_count"] == 5; print(json.dumps({"sample_count": 5, "valid": p["validity"]["valid"], "reasons": p["validity"]["reasons"], "median_ms": p["summary"]["median_ms"], "max_ms": p["summary"]["max_ms"]}, sort_keys=True))'

      - name: Upload merged report and checkpoints
        uses: actions/upload-artifact@v6
        with:
          name: p6-smoke-full-build-merged
          if-no-files-found: error
          retention-days: 14
          path: |
            .quality/p6-cloud/full-build.json
            .quality/p6-cloud/combined/
